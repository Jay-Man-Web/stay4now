
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Always Glow Card</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      position: relative;
      width: 300px;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* 🔥 Always-on glow */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at center,
        rgba(255, 90, 95, 0.25),
        transparent 70%
      );
      pointer-events: none;
    }

    .image-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .description {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="image-container">
      <img src="https://picsum.photos/400" alt="House">
    </div>
    <div class="content">
      <p class="title">Luxury Apartment</p>
      <p class="description">Modern, stylish, and close to everything.</p>
      <p class="price">R1200 · ★ 4.8</p>
    </div>
  </div>

</body>
</html>
