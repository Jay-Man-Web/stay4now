<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stay4now | Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <header class="header" id="main-header">
    <div class="search-bar-container" id="search-container">
      <input type="text" id="search-input" class="search-bar" placeholder="Where to?">
    </div>
    
    <nav class="header-tabs centered">
      <button class="tab-btn active" data-category="all">All Stays</button>
      <button class="tab-btn" data-category="filtered">Filtered</button>
    </nav>

    <div id="filter-panel" class="filter-container hidden">
      <div class="filter-group">
        <input type="number" id="filter-min-price" placeholder="Min Price (R)" class="filter-input">
        <input type="number" id="filter-max-price" placeholder="Max Price (R)" class="filter-input">
        <input type="text" id="filter-loc" placeholder="City or area" class="filter-input">
        <button id="btn-apply-filters" class="reserve-btn filter-btn">Apply</button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="page-view active" id="view-explore">
      <div id="houses-layout">
        <div class="sub-section">
          <h2>Popular Right Now</h2>
          <div class="section-content" id="popular-container"></div>
        </div>
        <div class="sub-section">
          <h2>Luxury Escapes</h2>
          <div class="section-content" id="luxury-container"></div>
        </div>
        <div class="sub-section">
          <h2>Budget Friendly</h2>
          <div class="section-content" id="budget-container"></div>
        </div>
      </div>

      <div id="search-layout" class="hidden">
        <div class="search-header">
          <button id="btn-exit-search" class="icon-btn">← Back</button>
          <h2 id="search-result-label">Results</h2>
        </div>
        <div id="search-results-container" class="search-grid"></div>
      </div>
    </section>

    <section class="page-view" id="view-wishlist">
      <div class="content-padding">
        <h1>Your Wishlist</h1>
        <p class="text-muted">Places you've saved for later.</p>
        <div id="wishlist-container" class="wishlist-grid">
          </div>
      </div>
    </section>

    <section class="page-view" id="view-profile">
      <div class="content-padding">
        <div class="profile-header">
          <div class="profile-avatar-large">👤</div>
          <div class="profile-info">
            <h1>Jane Doe</h1>
            <p class="text-muted">Account ID: #102938</p>
          </div>
        </div>
        
        <div class="profile-menu">
          <button class="menu-item">
            <span>🏠 My Properties</span>
            <span class="chevron">›</span>
          </button>
          <button class="menu-item">
            <span>📅 Booking History</span>
            <span class="chevron">›</span>
          </button>
          <button class="menu-item">
            <span>⚙️ Account Settings</span>
            <span class="chevron">›</span>
          </button>
          <button class="menu-item text-danger">
            <span>Log Out</span>
          </button>
        </div>
      </div>
    </section>
    
    <footer class="site-footer">
      <div class="footer-settings">
        <div class="setting-item"><span>🌍 English</span></div>
        <div class="setting-item"><span>ZAR</span></div>
      </div>
      <div class="footer-legal">
        <p>© 2026 stay4now, Inc.</p>
        <div class="legal-links">
          <a href="#">Privacy</a> · <a href="#">Terms</a>
        </div>
      </div>
    </footer>
  </main>

  <nav class="bottom-nav">
    <button class="bottom-tab active" data-target="view-explore">
      <div class="bottom-tab-icon">🌍</div>
      <p>Explore</p>
    </button>
    <button class="bottom-tab" data-target="view-wishlist">
      <div class="bottom-tab-icon">❤️</div>
      <p>Wishlist</p>
    </button>
    <button class="bottom-tab" data-target="view-profile">
      <div class="bottom-tab-icon">👤</div>
      <p>Profile</p>
    </button>
  </nav>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
